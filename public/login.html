<!DOCTYPE html>
<html>
<head>
  <title>Login - Geolab</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2e4a7d, #1c2f52);
      color: white;
      margin: 0;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 380px;

      background: rgba(255,255,255,0.08);
      padding: 30px 20px;
      border-radius: 20px;

      backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);

      text-align: center;
    }

    .logo {
      width: 70%;
      max-width: 200px;
      margin-bottom: 15px;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 10px;
      margin-bottom: 5px;
      font-size: 14px;
      opacity: 0.8;
    }

    input {
      width: 100%;
      padding: 16px;

      border-radius: 12px;
      border: none;

      margin-bottom: 15px;

      font-size: 16px;

      outline: none;

      background: rgba(255,255,255,0.95);
      color: #333;

      box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
    }

    input:focus {
      box-shadow: 0 0 0 2px #2ecc71;
    }

    button {
      width: 100%;
      padding: 16px;
      margin-top: 10px;

      border: none;
      border-radius: 14px;

      font-size: 16px;
      font-weight: bold;

      color: white;
      background: #2ecc71;

      cursor: pointer;
      transition: 0.2s;

      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    button:active {
      transform: scale(0.97);
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <h2>Acesso ao Sistema</h2>

    <label>Usuário</label>
    <input type="text" id="usuario" placeholder="Digite seu usuário">

    <label>Senha</label>
    <input type="password" id="senha" placeholder="Digite sua senha">

    <button onclick="fazerLogin()">Entrar</button>

  </div>

  <script>

    // 🔐 Se já estiver logado, entra direto
    const jaLogado = localStorage.getItem('usuarioLogado');
    if (jaLogado) {
      window.location.href = "index.html";
    }

    function fazerLogin() {
      const usuario = document.getElementById('usuario').value;
      const senha = document.getElementById('senha').value;

      if (usuario === "admin" && senha === "123") {

        localStorage.setItem('usuarioLogado', JSON.stringify({
          nome: "Wender Cardoso",
          usuario: usuario
        }));

        window.location.href = "index.html";

      } else {
        alert("Usuário ou senha inválidos");
      }
    }

  </script>

</body>
</html>
