<!DOCTYPE html>
<html>
<head>
  <title>Login - Geolab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2e4a7d, #1c2f52);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .container {
      width: 100%;
      max-width: 400px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      text-align: center;
    }

    .logo {
      max-width: 180px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border-radius: 12px;
      border: none;
      background: #2ecc71;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="container">

    <img src="logo.png" class="logo">

    <h2>Acesso ao Sistema</h2>

    <input type="text" id="usuario" placeholder="Usuário">
    <input type="password" id="senha" placeholder="Senha">

    <button onclick="login()">Entrar</button>

  </div>

  <script>
    function login() {
      const usuario = document.getElementById('usuario').value;

      if (!usuario) {
        alert("Digite o usuário");
        return;
      }

      localStorage.setItem('nome', usuario);
      location.href = "index.html";
    }
  </script>

</body>
</html>
