<!DOCTYPE html>
<html>
<head>
  <title>Login - Geolab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2e4a7d, #1c2f52);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .box {
      width: 100%;
      max-width: 400px;
      padding: 30px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(15px);
      text-align: center;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 15px;
      border: none;
      border-radius: 12px;
      background: #2ecc71;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Login</h2>

    <input id="usuario" placeholder="Usuário">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>
  </div>

  <script>
    function login() {
      const usuario = document.getElementById('usuario').value;
      const senha = document.getElementById('senha').value;

      fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ usuario, senha })
      })
      .then(res => res.json())
      .then(data => {
        if (data.ok) {
          localStorage.setItem('usuario', usuario);
          window.location.href = '/';
        } else {
          alert("Usuário ou senha inválidos");
        }
      });
    }
  </script>

</body>
</html>
