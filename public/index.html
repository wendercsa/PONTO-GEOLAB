<!DOCTYPE html>
<html>
<head>
  <title>Geolab</title>
  <style>
  body {
    font-family: Arial;
    text-align: center;
    background: #2e4a7d;
    color: white;
  }

  button {
    width: 80%;
    padding: 15px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    color: white;
    font-size: 16px;
  }

  .entrada { background: green; }
  .intervalo { background: orange; }
  .retorno { background: blue; }
  .saida { background: red; }

  /* 👇 ADICIONA ISSO AQUI */
  .container {
    max-width: 400px;
    margin: 50px auto;
    background: rgba(0,0,0,0.2);
    padding: 20px;
    border-radius: 15px;
  }
</style>
</head>
<body>

<div class="container">

  <h2>Geolab Sistema de Ponto ⏱️</h2>

  <button onclick="baterPonto('entrada')" class="entrada">Entrada</button>
  <button onclick="baterPonto('intervalo')" class="intervalo">Intervalo</button>
  <button onclick="baterPonto('retorno')" class="retorno">Retorno</button>
  <button onclick="baterPonto('saida')" class="saida">Saída</button>

  <a href="historico.html">
    <button class="historico">Ver Histórico</button>
  </a>

</div>

<script src="script.js"></script>

</body>
</html>
