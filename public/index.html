<!DOCTYPE html>
<html>
<head>
  <title>Geolab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2e4a7d, #1c2f52);
      color: white;
      margin: 0;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;

      background: rgba(255,255,255,0.08);
      padding: 30px 24px 35px;
      border-radius: 26px;

      backdrop-filter: blur(20px);
      box-shadow: 
        0 15px 50px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.15);

      text-align: center;
      animation: aparecer 0.6s ease;
    }

    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 15px;
    }

    .logo {
      max-width: 200px;
      width: 70%;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
      opacity: 0.95;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .subtitulo {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 20px;
      margin: 12px 0;

      border: none;
      border-radius: 16px;

      font-size: 18px;
      font-weight: bold;

      color: white;
      cursor: pointer;

      box-shadow: 0 6px 15px rgba(0,0,0,0.25);
    }

    .entrada { background: #2ecc71; }
    .intervalo { background: #f39c12; }
    .retorno { background: #3498db; }
    .saida { background: #e74c3c; }

    .historico {
      background: #bdc3c7;
      color: #2c3e50;
    }

    .logout {
      margin-top: 15px;
      font-size: 14px;
      background: transparent;
      color: #ccc;
      box-shadow: none;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo-container">
      <img src="logo.png" class="logo">
    </div>

    <h2 id="tituloNome">Geolab</h2>
    <p class="subtitulo">Registro de Jornada</p>

    <p id="dataHora" class="subtitulo"></p>

    <button class="entrada" onclick="baterPonto('entrada')">Entrada</button>
    <button class="intervalo" onclick="baterPonto('intervalo')">Intervalo</button>
    <button class="retorno" onclick="baterPonto('retorno')">Retorno</button>
    <button class="saida" onclick="baterPonto('saida')">Saída</button>

    <a href="historico.html">
      <button class="historico">Ver Histórico</button>
    </a>

    <button class="logout" onclick="logout()">Sair</button>

  </div>

  <script>
    const titulo = document.getElementById('tituloNome');

    let nomeSalvo = localStorage.getItem('nome');

    if (!nomeSalvo) {
      nomeSalvo = prompt("Digite seu nome:");
      localStorage.setItem('nome', nomeSalvo);
    }

    const primeiroNome = nomeSalvo.split(" ")[0];
    titulo.innerText = "Olá, " + primeiroNome;

    function logout() {
      localStorage.removeItem('nome');
      location.href = "login.html";
    }

    function baterPonto(tipo) {
      fetch('/bater-ponto', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tipo, nome: nomeSalvo })
      })
      .then(res => res.text())
      .then(msg => alert(msg))
      .catch(() => alert("Erro ao registrar ponto"));
    }

    function atualizarHora() {
      const agora = new Date();
      document.getElementById('dataHora').innerText = agora.toLocaleString('pt-BR');
    }

    setInterval(atualizarHora, 1000);
    atualizarHora();
  </script>

</body>
</html>
