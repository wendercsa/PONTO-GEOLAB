<!DOCTYPE html>
<html>
<head>
  <title>Geolab</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2e4a7d, #1c2f52);
      color: white;
      margin: 0;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 380px;

      background: rgba(255,255,255,0.08);
      padding: 25px 20px;
      border-radius: 22px;

      backdrop-filter: blur(15px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);

      text-align: center;
    }

    .logo {
      width: 60%;
      max-width: 180px;
      margin-bottom: 10px;
      opacity: 0.95;
    }

    h2 {
      font-size: 22px;
      margin: 10px 0 5px;
    }

    .subtitulo {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 5px;
    }

    .data {
      font-size: 13px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 18px;
      margin: 10px 0;

      border: none;
      border-radius: 16px;

      font-size: 17px;
      font-weight: bold;

      color: white;
      cursor: pointer;

      transition: 0.2s;
      box-shadow: 0 6px 15px rgba(0,0,0,0.25);
    }

    button:active {
      transform: scale(0.96);
    }

    .entrada { background: #2ecc71; }
    .intervalo { background: #f39c12; }
    .retorno { background: #3498db; }
    .saida { background: #e74c3c; }

    .historico {
      background: #bdc3c7;
      color: #2c3e50;
    }

    .admin {
      background: #8e44ad;
    }

    .logout {
      margin-top: 10px;
      font-size: 14px;
      background: transparent;
      color: #ccc;
      box-shadow: none;
    }

  </style>
</head>

<body>

  <div class="container">

    <img src="logo.png" class="logo">

    <h2 id="tituloNome">Carregando...</h2>

    <p class="subtitulo">Registro de Jornada</p>
    <p id="dataHora" class="data"></p>

    <button class="entrada" onclick="baterPonto('entrada')">Entrada</button>
    <button class="intervalo" onclick="baterPonto('intervalo')">Intervalo</button>
    <button class="retorno" onclick="baterPonto('retorno')">Retorno</button>
    <button class="saida" onclick="baterPonto('saida')">Saída</button>

    <a href="historico.html">
      <button class="historico">Ver Histórico</button>
    </a>

    <button id="btnAdmin" class="admin" onclick="abrirAdmin()" style="display:none;">
      Painel Admin
    </button>

    <button class="logout" onclick="logout()">Sair</button>

  </div>

  <script>

    const nome = localStorage.getItem('nome');
    const usuario = localStorage.getItem('usuario');
    const tipo = localStorage.getItem('tipo');

    if (!nome || !usuario) {
      window.location.href = "login.html";
    }

    const primeiroNome = nome.split(" ")[0];
    document.getElementById('tituloNome').innerText = "Olá, " + primeiroNome;

    if (tipo === 'admin') {
      document.getElementById('btnAdmin').style.display = 'block';
    }

    function abrirAdmin() {
      window.location.href = "admin.html";
    }

    function mostrarToast(msg) {
      const toast = document.createElement('div');
      toast.innerText = msg;

      toast.style.position = 'fixed';
      toast.style.bottom = '30px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.background = '#111';
      toast.style.color = '#fff';
      toast.style.padding = '16px 22px';
      toast.style.borderRadius = '12px';
      toast.style.boxShadow = '0 5px 20px rgba(0,0,0,0.3)';
      toast.style.fontSize = '16px';
      toast.style.zIndex = '999';

      document.body.appendChild(toast);

      setTimeout(() => toast.remove(), 3000);
    }

    // 🔥 GEOLOCALIZAÇÃO AQUI
    function baterPonto(tipo) {

      if (!navigator.geolocation) {
        mostrarToast("Geolocalização não suportada");
        return;
      }

      navigator.geolocation.getCurrentPosition(

        (pos) => {

          const latitude = pos.coords.latitude;
          const longitude = pos.coords.longitude;

          fetch('/bater-ponto', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              tipo,
              nome,
              usuario,
              latitude,
              longitude
            })
          })
          .then(res => res.text())
          .then(msg => mostrarToast(msg))
          .catch(() => mostrarToast("Erro ao registrar ponto"));

        },

        (err) => {
          mostrarToast("Permita a localização para bater ponto");
        },

        {
          enableHighAccuracy: true
        }

      );
    }

    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }

    function atualizarHora() {
      const agora = new Date();
      document.getElementById('dataHora').innerText =
        agora.toLocaleString('pt-BR');
    }

    setInterval(atualizarHora, 1000);
    atualizarHora();

  </script>

</body>
</html>
