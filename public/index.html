<!DOCTYPE html>
<html>
<head>
  <title>Geolab</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #2e4a7d;
      color: white;
    }

    button {
      width: 80%;
      padding: 15px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }

    .entrada { background: green; }
    .intervalo { background: orange; }
    .retorno { background: blue; }
    .saida { background: red; }
  </style>
</head>
<body>

<h2>Geolab Sistema de Ponto 🚀</h2>

<button class="entrada">Entrada</button>
<button class="intervalo">Intervalo</button>
<button class="retorno">Retorno</button>
<button class="saida">Saída</button>

</body>
</html>
