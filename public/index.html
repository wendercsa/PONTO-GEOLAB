<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

<h2>Geolab</h2>

<input id="email" placeholder="Email"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>

<button onclick="login()">Entrar</button>

<p id="msg"></p>

<script>
function login() {
  fetch('/login', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      email: document.getElementById('email').value,
      senha: document.getElementById('senha').value
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.mensagem === "Login realizado") {

      localStorage.setItem("usuario", JSON.stringify(data.usuario));

      window.location.href = "/home.html";

    } else {
      document.getElementById('msg').innerText = "Erro no login";
    }
  });
}
</script>

</body>
</html>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #4b6cb7, #182848);
  color: #000;
}

button {
  width: 80%;
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
}

.entrada { background: #2ecc71; }
.pausa { background: #f1c40f; }
.retorno { background: #3498db; }
.saida { background: #e74c3c; }
</style>
