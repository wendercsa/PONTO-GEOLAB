<!DOCTYPE html>
<html>
<head>
  <title>Geolab</title>

  <!-- RESPONSIVO -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2e4a7d, #1c2f52);
      color: white;
      margin: 0;

      display: flex;
      justify-content: center;
      align-items: center;

      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;

      background: rgba(255,255,255,0.06);
      padding: 30px;
      border-radius: 24px;

      backdrop-filter: blur(20px);
      box-shadow: 
        0 10px 40px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.1);

      text-align: center;
    }

    h2 {
      font-size: 22px;
      margin-bottom: 5px;
    }

    .subtitulo {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 25px;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 10px 0;

      border: none;
      border-radius: 14px;

      font-size: 16px;
      font-weight: bold;
      letter-spacing: 0.5px;

      color: white;
      cursor: pointer;

      transition: 0.2s;
    }

    button:hover {
      filter: brightness(1.1);
    }

    button:active {
      transform: scale(0.97);
    }

    .entrada { background: #2ecc71; }
    .intervalo { background: #f39c12; }
    .retorno { background: #3498db; }
    .saida { background: #e74c3c; }

    .historico {
      background: #bdc3c7;
      color: #2c3e50;
    }

    /* MOBILE */
    @media (max-width: 480px) {
      h2 { font-size: 24px; }
      button { font-size: 17px; padding: 18px; }
    }

    @media (max-width: 360px) {
      h2 { font-size: 20px; }
      button { font-size: 15px; padding: 14px; }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Geolab</h2>
    <p class="subtitulo">Sistema de Ponto</p>

    <button class="entrada" onclick="baterPonto('entrada')">Entrada</button>
    <button class="intervalo" onclick="baterPonto('intervalo')">Intervalo</button>
    <button class="retorno" onclick="baterPonto('retorno')">Retorno</button>
    <button class="saida" onclick="baterPonto('saida')">Saída</button>

    <a href="historico.html">
      <button class="historico">Ver Histórico</button>
    </a>
  </div>

  <script>
    function mostrarToast(msg) {
      const toast = document.createElement('div');
      toast.innerText = msg;

      toast.style.position = 'fixed';
      toast.style.bottom = '30px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.background = '#111';
      toast.style.color = '#fff';
      toast.style.padding = '15px 20px';
      toast.style.borderRadius = '12px';
      toast.style.boxShadow = '0 5px 20px rgba(0,0,0,0.3)';
      toast.style.zIndex = '999';

      document.body.appendChild(toast);

      setTimeout(() => toast.remove(), 3000);
    }

    function baterPonto(tipo) {
      fetch('/bater-ponto', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ tipo })
      })
      .then(res => res.text())
      .then(msg => mostrarToast(msg))
      .catch(() => mostrarToast("Erro ao registrar ponto"));
    }
  </script>

</body>
</html>
