<!DOCTYPE html>
<html>
<head>
  <title>Geolab</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2e4a7d, #1c2f52);
      color: white;
      margin: 0;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;

      background: rgba(255,255,255,0.08);
      padding: 35px 25px;
      border-radius: 26px;

      backdrop-filter: blur(20px);
      box-shadow: 
        0 15px 50px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.15);

      text-align: center;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .subtitulo {
      font-size: 16px;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 20px;
      margin: 12px 0;

      border: none;
      border-radius: 16px;

      font-size: 18px;
      font-weight: bold;

      color: white;
      cursor: pointer;

      transition: 0.2s;
      box-shadow: 0 6px 15px rgba(0,0,0,0.25);
    }

    button:active {
      transform: scale(0.96);
    }

    .entrada { background: #2ecc71; }
    .intervalo { background: #f39c12; }
    .retorno { background: #3498db; }
    .saida { background: #e74c3c; }

    .historico {
      background: #bdc3c7;
      color: #2c3e50;
    }

    .logout {
      margin-top: 10px;
      font-size: 14px;
      background: transparent;
      color: #ddd;
      box-shadow: none;
    }

    @media (max-width: 400px) {
      h2 { font-size: 20px; }
      button { font-size: 16px; padding: 18px; }
    }
  </style>
</head>

<body>

  <div class="container">

    <h2 id="tituloNome">Geolab</h2>
    <p class="subtitulo">Sistema de Ponto</p>

    <input 
      type="text" 
      id="nome" 
      placeholder="Digite seu nome"
    >

    <button class="entrada" onclick="baterPonto('entrada')">Entrada</button>
    <button class="intervalo" onclick="baterPonto('intervalo')">Intervalo</button>
    <button class="retorno" onclick="baterPonto('retorno')">Retorno</button>
    <button class="saida" onclick="baterPonto('saida')">Saída</button>

    <a href="historico.html">
      <button class="historico">Ver Histórico</button>
    </a>

    <button class="logout" onclick="logout()">Sair</button>

  </div>

  <script>

    const inputNome = document.getElementById('nome');
    const titulo = document.getElementById('tituloNome');

    // 🔐 carregar nome salvo
    const nomeSalvo = localStorage.getItem('nome');

    if (nomeSalvo) {
      inputNome.value = nomeSalvo;
      titulo.innerText = "Olá, " + nomeSalvo;

      // esconde input (fica mais profissional)
      inputNome.style.display = "none";
    }

    // salvar nome
    inputNome.addEventListener('change', () => {
      if (inputNome.value.trim() !== "") {
        localStorage.setItem('nome', inputNome.value);
        titulo.innerText = "Olá, " + inputNome.value;
        inputNome.style.display = "none";
      }
    });

    function logout() {
      localStorage.removeItem('nome');
      location.reload();
    }

    function mostrarToast(msg) {
      const toast = document.createElement('div');
      toast.innerText = msg;

      toast.style.position = 'fixed';
      toast.style.bottom = '30px';
      toast.style.left = '50%';
      toast.style.transform = 'translateX(-50%)';
      toast.style.background = '#111';
      toast.style.color = '#fff';
      toast.style.padding = '16px 22px';
      toast.style.borderRadius = '12px';
      toast.style.boxShadow = '0 5px 20px rgba(0,0,0,0.3)';
      toast.style.fontSize = '16px';
      toast.style.zIndex = '999';

      document.body.appendChild(toast);

      setTimeout(() => toast.remove(), 3000);
    }

    function baterPonto(tipo) {
      const nome = localStorage.getItem('nome');

      if (!nome) {
        mostrarToast("Digite seu nome primeiro!");
        return;
      }

      fetch('/bater-ponto', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ tipo, nome })
      })
      .then(res => res.text())
      .then(msg => mostrarToast(msg))
      .catch(() => mostrarToast("Erro ao registrar ponto"));
    }

  </script>

</body>
</html>
