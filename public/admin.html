<!DOCTYPE html>
<html>
<head>
  <title>Admin - Geolab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2e4a7d, #1c2f52);
      color: white;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .box {
      width: 100%;
      max-width: 380px;
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    h3 {
      margin-top: 20px;
      text-align: left;
      font-size: 16px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 16px;
      background: #2ecc71;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .user {
      background: rgba(255,255,255,0.1);
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      text-align: left;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Cadastrar Usuário</h2>

  <input id="nome" placeholder="Nome completo">
  <input id="usuario" placeholder="Usuário">
  <input id="senha" type="password" placeholder="Senha">

  <select id="tipo">
    <option value="colaborador">Colaborador</option>
    <option value="admin">Administrador</option>
  </select>

  <button onclick="cadastrar()">Cadastrar</button>

  <!-- 🔥 LISTA DE USUÁRIOS -->
  <h3>👥 Usuários cadastrados</h3>
  <div id="listaUsuarios"></div>

</div>

<script>

// 🔐 PROTEÇÃO ADMIN
const tipo = localStorage.getItem('tipo');

if (tipo !== 'admin') {
  alert("Acesso restrito!");
  window.location.href = "index.html";
}

// 🚀 CADASTRAR
function cadastrar() {
  const nome = document.getElementById('nome').value;
  const usuario = document.getElementById('usuario').value;
  const senha = document.getElementById('senha').value;
  const tipo = document.getElementById('tipo').value;

  fetch('/cadastrar-usuario', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ nome, usuario, senha, tipo })
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    listarUsuarios(); // 🔥 ATUALIZA LISTA
  });
}

// 📋 LISTAR USUÁRIOS
async function listarUsuarios() {
  const res = await fetch('/usuarios');
  const dados = await res.json();

  const lista = document.getElementById('listaUsuarios');
  lista.innerHTML = '';

  dados.forEach(u => {
    const div = document.createElement('div');
    div.className = 'user';

    div.innerHTML = `
      <strong>${u.nome}</strong><br>
      Usuário: ${u.usuario}<br>
      Tipo: ${u.tipo}
    `;

    lista.appendChild(div);
  });
}

// 🔥 CARREGA AUTOMATICAMENTE
listarUsuarios();

</script>

</body>
</html>
