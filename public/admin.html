<!DOCTYPE html>
<html>
<head>
  <title>Admin - Geolab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #2e4a7d, #1c2f52);
      color: white;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 400px;
      background: rgba(255,255,255,0.08);
      padding: 25px;
      border-radius: 20px;
      backdrop-filter: blur(15px);
      text-align: center;
    }

    input, select {
      width: 100%;
      padding: 14px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-cadastrar {
      background: #2ecc71;
    }

    .user {
      background: rgba(255,255,255,0.1);
      padding: 12px;
      border-radius: 12px;
      margin-top: 10px;
      text-align: left;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .edit {
      background: #3498db;
      flex: 1;
    }

    .delete {
      background: #e74c3c;
      flex: 1;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>Cadastrar Usuário</h2>

  <input id="nome" placeholder="Nome completo">
  <input id="usuario" placeholder="Usuário">
  <input id="senha" type="password" placeholder="Senha">

  <select id="tipo">
    <option value="colaborador">Colaborador</option>
    <option value="admin">Administrador</option>
  </select>

  <button class="btn-cadastrar" onclick="cadastrar()">Cadastrar</button>

  <h3>👥 Usuários cadastrados</h3>
  <div id="listaUsuarios"></div>

</div>

<script>

// 🔐 PROTEÇÃO ADMIN
if (localStorage.getItem('tipo') !== 'admin') {
  alert("Acesso restrito!");
  window.location.href = "index.html";
}

// CADASTRAR
function cadastrar() {
  const nome = document.getElementById('nome').value;
  const usuario = document.getElementById('usuario').value;
  const senha = document.getElementById('senha').value;
  const tipo = document.getElementById('tipo').value;

  fetch('/cadastrar-usuario', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ nome, usuario, senha, tipo })
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    listarUsuarios();
  });
}

// LISTAR
async function listarUsuarios() {
  const res = await fetch('/usuarios');
  const dados = await res.json();

  const lista = document.getElementById('listaUsuarios');
  lista.innerHTML = '';

  dados.forEach(u => {

    const div = document.createElement('div');
    div.className = 'user';

    div.innerHTML = `
      <strong>${u.nome}</strong><br>
      Usuário: ${u.usuario}<br>
      Tipo: ${u.tipo}

      <div class="actions">
        <button class="edit" onclick="editar('${u.usuario}', '${u.nome}', '${u.tipo}')">
          Editar
        </button>

        <button class="delete" onclick="excluir('${u.usuario}')">
          Excluir
        </button>
      </div>
    `;

    lista.appendChild(div);
  });
}

// ✏️ EDITAR
function editar(usuario, nomeAtual, tipoAtual) {

  const novoNome = prompt("Novo nome:", nomeAtual);
  if (!novoNome) return;

  const novaSenha = prompt("Nova senha:");
  if (!novaSenha) return;

  const novoTipo = prompt("Tipo (admin ou colaborador):", tipoAtual);
  if (!novoTipo) return;

  fetch('/usuarios/' + usuario, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      nome: novoNome,
      senha: novaSenha,
      tipo: novoTipo
    })
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    listarUsuarios();
  });
}

// ❌ EXCLUIR
function excluir(usuario) {

  if (!confirm("Deseja excluir este usuário?")) return;

  fetch('/usuarios/' + usuario, {
    method: 'DELETE'
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    listarUsuarios();
  });
}

// INICIAR
listarUsuarios();

</script>

</body>
</html>
