<!DOCTYPE html>
<html>
<head>
  <title>Histórico - Geolab</title>

  <style>
    body {
      font-family: Arial;
      background: #2e4a7d;
      color: white;
      margin: 0;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .card {
  background: rgba(255,255,255,0.08);
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;

  backdrop-filter: blur(10px);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);

  transition: 0.2s;
}

.card:hover {
  transform: scale(1.02);
}
    
    .tipo {
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: bold;
}

.entrada {
  background: rgba(76,175,80,0.2);
  color: #4CAF50;
}

.saida {
  background: rgba(244,67,54,0.2);
  color: #f44336;
}

.intervalo {
  background: rgba(255,152,0,0.2);
  color: #FF9800;
}

.retorno {
  background: rgba(33,150,243,0.2);
  color: #2196F3;
}

    .entrada { color: #4CAF50; }
    .saida { color: #f44336; }
    .intervalo { color: #FF9800; }
    .retorno { color: #2196F3; }

    .data {
      font-size: 13px;
      opacity: 0.8;
    }

    .voltar {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #555;
      color: white;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>📊 Histórico de Pontos</h2>

    <div id="lista"></div>

    <a href="index.html">
      <button class="voltar">⬅ Voltar</button>
    </a>
  </div>

  <script>
async function carregarHistorico() {
  const res = await fetch('/historico');
  const dados = await res.json();

  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  // ordenar
  dados.sort((a, b) => new Date(a.data) - new Date(b.data));

  const agrupado = {};

  // agrupar por data
  dados.forEach(p => {
    const data = new Date(p.data).toLocaleDateString();
    if (!agrupado[data]) agrupado[data] = [];
    agrupado[data].push(p);
  });

  // montar tela
  Object.keys(agrupado).reverse().forEach(data => {

    const titulo = document.createElement('h3');
    titulo.innerText = '📅 ' + data;
    titulo.style.marginTop = '20px';
    lista.appendChild(titulo);

    let totalMs = 0;
    let entrada = null;

    agrupado[data].forEach(ponto => {

      const div = document.createElement('div');
      div.className = 'card';

      const tipo = document.createElement('div');
      tipo.className = 'tipo ' + ponto.tipo;
      tipo.innerText = ponto.tipo.toUpperCase();

      const hora = new Date(ponto.data).toLocaleTimeString();

      const dataEl = document.createElement('div');
      dataEl.className = 'data';
      dataEl.innerText = hora;

      div.appendChild(tipo);
      div.appendChild(dataEl);

      lista.appendChild(div);

      // cálculo de horas
      if (ponto.tipo === 'entrada') {
        entrada = new Date(ponto.data);
      }

      if (ponto.tipo === 'saida' && entrada) {
        totalMs += new Date(ponto.data) - entrada;
        entrada = null;
      }

    });

    // total do dia
    const horas = Math.floor(totalMs / 3600000);
    const minutos = Math.floor((totalMs % 3600000) / 60000);

    const total = document.createElement('div');
    total.style.margin = '10px 0 20px';
    total.style.fontWeight = 'bold';
    total.innerText = `⏱ Total: ${horas}h ${minutos}min`;

    lista.appendChild(total);

  });
}

carregarHistorico();
</script>
  </script>

</body>
</html>
