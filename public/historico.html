<!DOCTYPE html>
<html>
<head>
  <title>Histórico - Geolab</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', Arial;
      background: #2e4a7d;
      color: white;
      margin: 0;
      font-size: 20px;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      padding: 20px;
      text-align: center;
    }

    .logo-container {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }

    .logo {
      max-width: 180px;
      width: 70%;
      filter: drop-shadow(0 8px 20px rgba(0,0,0,0.4));
      opacity: 0.95;
    }

    h2 {
      margin-bottom: 20px;
      font-size: 26px;
    }

    h3 {
      margin-top: 20px;
      opacity: 0.9;
      font-size: 18px;
      text-align: left;
    }

    .card {
      background: rgba(255,255,255,0.08);
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;

      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      font-size: 16px;
    }

    .tipo {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
    }

    .entrada { background: rgba(76,175,80,0.2); color: #4CAF50; }
    .saida { background: rgba(244,67,54,0.2); color: #f44336; }
    .intervalo { background: rgba(255,152,0,0.2); color: #FF9800; }
    .retorno { background: rgba(33,150,243,0.2); color: #2196F3; }

    .data {
      font-size: 14px;
      opacity: 0.9;
    }

    .total {
      margin: 12px 0 20px;
      font-weight: bold;
      font-size: 18px;
      text-align: left;
    }

    .vazio {
      opacity: 0.7;
      margin-top: 20px;
    }

    .voltar {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #555;
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo-container">
    <img src="logo.png" class="logo">
  </div>

  <h2>📊 Histórico de Pontos</h2>

  <div id="lista"></div>

  <a href="index.html">
    <button class="voltar">⬅ Voltar</button>
  </a>

</div>

<script>

async function carregarHistorico() {

  const usuario = localStorage.getItem('usuario');

  if (!usuario) {
    alert("Sessão expirada");
    window.location.href = "login.html";
    return;
  }

  const res = await fetch('/historico/' + usuario);
  const dados = await res.json();

  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  if (dados.length === 0) {
    lista.innerHTML = "<p class='vazio'>Nenhum registro encontrado.</p>";
    return;
  }

  // ordenar por data
  dados.sort((a, b) => new Date(a.data) - new Date(b.data));

  const agrupado = {};

  // agrupar por dia
  dados.forEach(p => {
    const data = new Date(p.data).toLocaleDateString('pt-BR');
    if (!agrupado[data]) agrupado[data] = [];
    agrupado[data].push(p);
  });

  Object.keys(agrupado).reverse().forEach(data => {

    const titulo = document.createElement('h3');
    titulo.innerText = '📅 ' + data;
    lista.appendChild(titulo);

    let totalMs = 0;
    let inicio = null;

    agrupado[data].forEach(ponto => {

      const atual = new Date(ponto.data);

      if (ponto.tipo === 'entrada' || ponto.tipo === 'retorno') {
        inicio = atual;
      }

      if (ponto.tipo === 'saida' && inicio) {
        totalMs += atual - inicio;
        inicio = null;
      }

      const div = document.createElement('div');
      div.className = 'card';

      const tipo = document.createElement('div');
      tipo.className = 'tipo ' + ponto.tipo;
      tipo.innerText = ponto.tipo.toUpperCase();

      const hora = atual.toLocaleTimeString('pt-BR');

      const dataEl = document.createElement('div');
      dataEl.className = 'data';
      dataEl.innerText = hora;

      div.appendChild(tipo);
      div.appendChild(dataEl);

      lista.appendChild(div);

    });

    const horas = Math.floor(totalMs / 3600000);
    const minutos = Math.floor((totalMs % 3600000) / 60000);

    const total = document.createElement('div');
    total.className = 'total';
    total.innerText = `⏱ Total: ${horas}h ${minutos}min`;

    lista.appendChild(total);

  });
}

carregarHistorico();

</script>

</body>
</html>
