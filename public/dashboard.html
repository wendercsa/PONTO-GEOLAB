<!DOCTYPE html>
<html>
<body>

<h2>Registrar Ponto</h2>

<button onclick="registrar('entrada')">Entrada</button><br><br>
<button onclick="registrar('intervalo')">Intervalo</button><br><br>
<button onclick="registrar('retorno')">Retorno</button><br><br>
<button onclick="registrar('saida')">Saída</button>

<p id="msg"></p>

<script>
function registrar(tipo) {

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  fetch('/ponto', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      tipo,
      email: usuario.email
    })
  })
  .then(res => res.text())
  .then(msg => {
    document.getElementById('msg').innerText = msg;
  });
}
</script>

</body>
</html>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(135deg, #4b6cb7, #182848);
  color: #000;
}

button {
  width: 80%;
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
}

.entrada { background: #2ecc71; }
.pausa { background: #f1c40f; }
.retorno { background: #3498db; }
.saida { background: #e74c3c; }
</style>
