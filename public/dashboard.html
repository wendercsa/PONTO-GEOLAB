<!DOCTYPE html>
<html>
<body>

<h2>Registrar Ponto</h2>

<button onclick="registrar('entrada')">Entrada</button><br><br>
<button onclick="registrar('intervalo')">Intervalo</button><br><br>
<button onclick="registrar('retorno')">Retorno</button><br><br>
<button onclick="registrar('saida')">Saída</button>

<p id="msg"></p>

<script>
function registrar(tipo) {

  const usuario = JSON.parse(localStorage.getItem("usuario"));

  fetch('/ponto', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      tipo,
      email: usuario.email
    })
  })
  .then(res => res.text())
  .then(msg => {
    document.getElementById('msg').innerText = msg;
  });
}
</script>

</body>
</html>
